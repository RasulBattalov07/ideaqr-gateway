# Test profile: isolated in-memory H2 so the suite never touches ./data and starts
# from a clean schema each run. Console is off (so production-style headers apply).
spring.datasource.url=jdbc:h2:mem:ideaqr-test;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# Flyway builds the fresh in-memory schema from V1; Hibernate then VALIDATES it —
# this is the real test that the baseline matches the entity model on H2.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.open-in-view=true

spring.h2.console.enabled=false
