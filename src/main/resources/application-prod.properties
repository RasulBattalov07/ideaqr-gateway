# =====================================================================
#  IDEAQR Digital Gateway — PRODUCTION profile (activate with
#  SPRING_PROFILES_ACTIVE=prod, as render.yaml does).
#
#  Hardened defaults for a public deployment (audit 4.4 / 4.10):
#    - the H2 web console is HARD-DISABLED (never reachable in prod);
#    - the database password is REQUIRED from the environment (H2_PASSWORD),
#      injected as a generated secret by the platform — no blank `sa`;
#    - no TCP/AUTO_SERVER, no SQL echo, no verbose error output.
#
#  Persistence stays on file-based H2 on the mounted disk (/app/data) so the
#  existing Render disk keeps working. To switch to managed Postgres instead,
#  activate the `postgres` profile and provide the DB_* env vars.
# =====================================================================

# --- Datasource: file-based H2 on the persistent disk --------------------------
spring.datasource.url=jdbc:h2:file:/app/data/ideaqr
spring.datasource.username=sa
spring.datasource.password=${H2_PASSWORD}
spring.datasource.driver-class-name=org.h2.Driver

# --- JPA / Hibernate -----------------------------------------------------------
# Flyway owns the schema; Hibernate only validates it (audit 3.5). Flyway settings
# are inherited from application.properties.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=true
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# --- H2 console: hard-disabled in production -----------------------------------
spring.h2.console.enabled=false

# --- Do not leak internals -----------------------------------------------------
server.error.include-message=never
server.error.include-stacktrace=never
server.error.include-binding-errors=never

# --- Rate limiting (audit C-1) -------------------------------------------------
# Render terminates TLS at a single edge proxy that appends the real client IP to
# X-Forwarded-For. Trust exactly that one hop so per-IP throttling keys on the true
# client and a forged X-Forwarded-For cannot mint a fresh bucket per request.
app.rate-limit.trusted-proxy-count=1

# --- JSON ----------------------------------------------------------------------
spring.jackson.default-property-inclusion=non_null
spring.jackson.serialization.write-dates-as-timestamps=false
