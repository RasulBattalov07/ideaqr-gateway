# ── Server ───────────────────────────────────────────────────────────────────
# Render.com передаёт порт через переменную окружения PORT
server.port=${PORT:8080}

# ── H2 In-Memory Database ─────────────────────────────────────────────────────
# MVP: данные журнала хранятся в памяти (сбрасываются при рестарте)
# Для продакшена заменить на PostgreSQL / Oracle
spring.datasource.url=jdbc:h2:mem:ideaqrdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# ── JPA ───────────────────────────────────────────────────────────────────────
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# ── H2 Web Console ────────────────────────────────────────────────────────────
# Доступен по адресу /h2-console
# JDBC URL: jdbc:h2:mem:ideaqrdb  |  User: sa  |  Password: (пусто)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true

# ── Jackson ───────────────────────────────────────────────────────────────────
# LocalDateTime → ISO-8601 строка (не timestamp)
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.deserialization.fail-on-unknown-properties=false

# ── Logging ───────────────────────────────────────────────────────────────────
logging.level.kz.ideaqr=DEBUG
logging.level.org.springframework.security=WARN
logging.level.org.hibernate=WARN
