# =====================================================================
#  IDEAQR Digital Gateway — default profile (local / single-node demo)
#
#  Persistence: file-based H2 at ./data/ideaqr.mv.db (survives restarts).
#  For a managed database use the `postgres` profile (see
#  application-postgres.properties) — no secrets are committed here.
# =====================================================================

spring.application.name=ideaqr-gateway

# Honour the platform-provided port (Render/Heroku); default 8080 locally.
server.port=${PORT:8080}

# --- Datasource: file-based H2 -------------------------------------------------
# AUTO_SERVER removed (audit 3.11): the embedded DB no longer opens a TCP server.
# The H2 password is sourced from the environment; it is blank only for the local
# default profile, where the console is the sole access path and stays loopback-bound.
spring.datasource.url=jdbc:h2:file:./data/ideaqr
spring.datasource.username=sa
spring.datasource.password=${H2_PASSWORD:}
spring.datasource.driver-class-name=org.h2.Driver

# --- JPA / Hibernate -----------------------------------------------------------
# Schema is owned by Flyway, not Hibernate. `validate` makes the app verify the
# entity model matches the migrated schema and FAIL FAST on any drift — it never
# mutates the database (audit 3.5). These Flyway/JPA settings are inherited by the
# prod / postgres / test profiles (which only override the datasource + ddl side).
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# --- Flyway (versioned migrations) ---------------------------------------------
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
# Adopt a pre-existing (Hibernate-created) database as the V1 baseline instead of
# failing — so legacy local data dirs keep working without a wipe.
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1

# --- H2 console (development convenience; disabled on the postgres profile) -----
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# --- JSON ----------------------------------------------------------------------
# Omit null fields so governance responses stay lean (e.g. no data payload on deny).
spring.jackson.default-property-inclusion=non_null
spring.jackson.serialization.write-dates-as-timestamps=false
