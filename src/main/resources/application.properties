# =====================================================================
#  IDEAQR Digital Gateway — default profile (local / single-node demo)
#
#  Persistence: file-based H2 at ./data/ideaqr.mv.db (survives restarts).
#  For a managed database use the `postgres` profile (see
#  application-postgres.properties) — no secrets are committed here.
# =====================================================================

spring.application.name=ideaqr-gateway

# Honour the platform-provided port (Render/Heroku); default 8080 locally.
server.port=${PORT:8080}

# --- Datasource: file-based H2 -------------------------------------------------
# AUTO_SERVER removed (audit 3.11): the embedded DB no longer opens a TCP server.
# The H2 password is sourced from the environment; it is blank only for the local
# default profile, where the console is the sole access path and stays loopback-bound.
spring.datasource.url=jdbc:h2:file:./data/ideaqr
spring.datasource.username=sa
spring.datasource.password=${H2_PASSWORD:}
spring.datasource.driver-class-name=org.h2.Driver

# --- JPA / Hibernate -----------------------------------------------------------
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# --- H2 console (development convenience; disabled on the postgres profile) -----
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# --- JSON ----------------------------------------------------------------------
# Omit null fields so governance responses stay lean (e.g. no data payload on deny).
spring.jackson.default-property-inclusion=non_null
spring.jackson.serialization.write-dates-as-timestamps=false
