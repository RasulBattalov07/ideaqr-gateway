# ============================================================
# IDEAQR Digital Gateway - Stage 2
# application.properties
# ============================================================

spring.application.name=ideaqr-gateway

# ------------------------------------------------------------
# Server / Render port binding
# Render injects the PORT env var; default to 8080 locally.
# ------------------------------------------------------------
server.port=${PORT:8080}

# ------------------------------------------------------------
# H2 in-memory datasource
# ------------------------------------------------------------
spring.datasource.url=jdbc:h2:mem:ideaqr;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# ------------------------------------------------------------
# H2 console (read-only inspection during demos)
# Reachable at /h2-console
# ------------------------------------------------------------
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true

# ------------------------------------------------------------
# JPA / Hibernate
# create-drop rebuilds the schema for every boot of the in-memory DB.
# ------------------------------------------------------------
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# ------------------------------------------------------------
# Jackson
# ------------------------------------------------------------
spring.jackson.serialization.write-dates-as-timestamps=false

# ------------------------------------------------------------
# Actuator (health endpoint for Render health checks)
# ------------------------------------------------------------
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# ------------------------------------------------------------
# Logging
# ------------------------------------------------------------
logging.level.root=INFO
logging.level.com.ideaqr.gateway=INFO
logging.level.org.hibernate.SQL=WARN
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} %-5level [%logger{36}] - %msg%n
