# =====================================================================
#  IDEAQR Digital Gateway — default profile (local / single-node demo)
#
#  Persistence: file-based H2 at ./data/ideaqr.mv.db (survives restarts).
#  For a managed database use the `postgres` profile (see
#  application-postgres.properties) — no secrets are committed here.
# =====================================================================

spring.application.name=ideaqr-gateway

# Honour the platform-provided port (Render/Heroku); default 8080 locally.
server.port=${PORT:8080}

# --- Datasource: file-based H2 -------------------------------------------------
# AUTO_SERVER removed (audit 3.11): the embedded DB no longer opens a TCP server.
# The H2 password is sourced from the environment; it is blank only for the local
# default profile, where the console is the sole access path and stays loopback-bound.
spring.datasource.url=jdbc:h2:file:./data/ideaqr
spring.datasource.username=sa
spring.datasource.password=${H2_PASSWORD:}
spring.datasource.driver-class-name=org.h2.Driver

# --- JPA / Hibernate -----------------------------------------------------------
# Schema is owned by Flyway, not Hibernate. `validate` makes the app verify the
# entity model matches the migrated schema and FAIL FAST on any drift — it never
# mutates the database (audit 3.5). These Flyway/JPA settings are inherited by the
# prod / postgres / test profiles (which only override the datasource + ddl side).
spring.jpa.hibernate.ddl-auto=validate
# open-in-view is ON to support per-request tenant isolation (audit 5.3): the request's
# Hibernate session is bound for the request, the tenant filter is enabled on it by
# TenantInterceptor, and @Transactional service calls join that same session. Safe here
# because controllers build explicit DTOs/maps and never lazy-traverse in the view.
spring.jpa.open-in-view=true
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# --- Flyway (versioned migrations) ---------------------------------------------
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
# Adopt a pre-existing (Hibernate-created) database as the V1 baseline instead of
# failing — so legacy local data dirs keep working without a wipe.
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1
# Binary column type for the Spring Session attributes table (V5). H2 (this default
# profile, plus test and prod) uses the ANSI BINARY LARGE OBJECT; the postgres
# profile overrides this to BYTEA.
spring.flyway.placeholders.session_blob_type=BINARY LARGE OBJECT

# --- Spring Session (JDBC-backed, audit 3.7) -----------------------------------
# Sessions live in the shared database (SPRING_SESSION / SPRING_SESSION_ATTRIBUTES),
# so every replica sees the same session and a restart does not log users out.
# Flyway owns those tables (V5), hence initialize-schema=never — Spring Session must
# not run its own DDL. Sessions idle out after 30 minutes.
spring.session.store-type=jdbc
spring.session.jdbc.initialize-schema=never
server.servlet.session.timeout=30m
# Keep the session cookie named JSESSIONID (Spring Session would otherwise rename it
# to SESSION), so the existing logout/cookie handling and the docs stay accurate. The
# cookie is HttpOnly — the SPA never reads it, only the separate XSRF-TOKEN cookie.
server.servlet.session.cookie.name=JSESSIONID
server.servlet.session.cookie.http-only=true

# --- Rate limiting (Bucket4j, audit 4.8 / 4.9) ---------------------------------
# Per-window request ceilings. The three public buckets are hard limits keyed by
# client IP (brute-force / guest-flood defence); the authenticated bucket is a
# generous baseline keyed by username. Tunable per environment without a rebuild.
app.rate-limit.enabled=true
app.rate-limit.window-seconds=60
app.rate-limit.login-capacity=10
app.rate-limit.guest-capacity=5
app.rate-limit.register-capacity=5
app.rate-limit.authenticated-capacity=100
# Trusted reverse proxies in front of the app (audit C-1). 0 = ignore X-Forwarded-For and
# key on the socket address (safe local default — no proxy in front of `mvn spring-boot:run`).
app.rate-limit.trusted-proxy-count=0

# --- H2 console (development convenience; disabled on the postgres profile) -----
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# --- JSON ----------------------------------------------------------------------
# Omit null fields so governance responses stay lean (e.g. no data payload on deny).
spring.jackson.default-property-inclusion=non_null
spring.jackson.serialization.write-dates-as-timestamps=false
