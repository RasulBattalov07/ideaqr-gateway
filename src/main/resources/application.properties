# =====================================================================
#  IDEAQR Digital Gateway — Stage 3
#  Default profile: file-based persistent H2 (survives restarts)
# =====================================================================

spring.application.name=ideaqr-digital-gateway
server.port=${PORT:8080}

# ---------------------------------------------------------------------
#  PERSISTENCE — file-based H2.
#  Data is written to ./data/ideaqr.mv.db and is preserved between
#  application restarts (this is the Stage 3 requirement: user
#  credentials and created QR objects must NOT be volatile).
# ---------------------------------------------------------------------
spring.datasource.url=jdbc:h2:file:./data/ideaqr;AUTO_SERVER=TRUE;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Keep the schema across restarts (update, never create-drop).
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.open-in-view=false
spring.jpa.show-sql=false

# H2 web console (development convenience): http://localhost:8080/h2-console
# JDBC URL to use in the console: jdbc:h2:file:./data/ideaqr
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ---------------------------------------------------------------------
#  JACKSON
# ---------------------------------------------------------------------
spring.jackson.serialization.indent-output=false
spring.jackson.default-property-inclusion=non_null

# ---------------------------------------------------------------------
#  GATEWAY DOMAIN CONFIGURATION
#  Working-hours policy window used by the context/policy engine
#  (ValidationService) for time-gated objects (medical, infrastructure).
# ---------------------------------------------------------------------
ideaqr.policy.working-hours.start=8
ideaqr.policy.working-hours.end=18
ideaqr.policy.min-trust.medical=70
ideaqr.policy.min-trust.infrastructure=70

# Multipart not used, but bound generously for safety.
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
