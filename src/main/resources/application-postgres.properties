# =====================================================================
#  IDEAQR Digital Gateway — Stage 3
#  PostgreSQL profile  (activate with: --spring.profiles.active=postgres)
#
#  Intended for Render.com / any managed Postgres. Provide the
#  connection details through environment variables so no secrets
#  are committed:
#     DATABASE_URL  -> e.g. jdbc:postgresql://host:5432/ideaqr
#     DB_USERNAME
#     DB_PASSWORD
# =====================================================================

spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/ideaqr}
spring.datasource.username=${DB_USERNAME:ideaqr}
spring.datasource.password=${DB_PASSWORD:ideaqr}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false
spring.jpa.show-sql=false

# H2 console is meaningless on Postgres.
spring.h2.console.enabled=false
