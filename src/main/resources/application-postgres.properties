# =====================================================================
#  IDEAQR Digital Gateway
#  PostgreSQL profile  (activate with: SPRING_PROFILES_ACTIVE=postgres)
#
#  Intended for Render.com / any managed Postgres. Connection details come
#  from the environment so no secrets are committed. The JDBC URL is built
#  from discrete parts because Render exposes host/port/database/user/password
#  individually (its connectionString is a non-JDBC `postgres://` URL).
#     DB_HOST  DB_PORT  DB_NAME  DB_USERNAME  DB_PASSWORD
# =====================================================================

spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:ideaqr}
spring.datasource.username=${DB_USERNAME:ideaqr}
spring.datasource.password=${DB_PASSWORD:ideaqr}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false
spring.jpa.show-sql=false

# H2 console is meaningless on Postgres — and must never be exposed in prod.
spring.h2.console.enabled=false

# Do not leak internals in error responses.
server.error.include-message=never
server.error.include-stacktrace=never
server.error.include-binding-errors=never
