<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#081420">
    <title>IDEAQR · Цифровой шлюз доступа</title>

    <!-- Manrope (display) · Golos Text (Cyrillic UI) · JetBrains Mono (codes).
         Self-hosted (audit 2.3): no external CDN, no privacy leak, works in closed
         networks. System fallbacks remain in CSS. -->
    <link rel="stylesheet" href="/assets/fonts/fonts.css">
    <link rel="stylesheet" href="/styles.css">
</head>
<body>
    <!-- Ambient Kazakh koshkar-müiz (ram's-horn) ornament. Purely decorative, inline
         SVG (CSP-safe — no external assets), fixed behind all content at low opacity. -->
    <div class="kz-deco" aria-hidden="true">
        <svg class="kz-tr" viewBox="0 0 200 200" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <path d="M100 60C70 60 58 86 82 96 96 102 96 80 86 82"/>
            <path d="M100 60C130 60 142 86 118 96 104 102 104 80 114 82"/>
            <path d="M100 140C70 140 58 114 82 104 96 98 96 120 86 118"/>
            <path d="M100 140C130 140 142 114 118 104 104 98 104 120 114 118"/>
            <path d="M60 100C60 70 86 58 96 82 102 96 80 96 82 86"/>
            <path d="M60 100C60 130 86 142 96 118 102 104 80 104 82 114"/>
            <path d="M140 100C140 70 114 58 104 82 98 96 120 96 118 86"/>
            <path d="M140 100C140 130 114 142 104 118 98 104 120 104 118 114"/>
            <circle cx="100" cy="100" r="6"/>
        </svg>
        <svg class="kz-bl" viewBox="0 0 200 200" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <path d="M100 60C70 60 58 86 82 96 96 102 96 80 86 82"/>
            <path d="M100 60C130 60 142 86 118 96 104 102 104 80 114 82"/>
            <path d="M100 140C70 140 58 114 82 104 96 98 96 120 86 118"/>
            <path d="M100 140C130 140 142 114 118 104 104 98 104 120 114 118"/>
            <path d="M60 100C60 70 86 58 96 82 102 96 80 96 82 86"/>
            <path d="M60 100C60 130 86 142 96 118 102 104 80 104 82 114"/>
            <path d="M140 100C140 70 114 58 104 82 98 96 120 96 118 86"/>
            <path d="M140 100C140 130 114 142 104 118 98 104 120 104 118 114"/>
            <circle cx="100" cy="100" r="6"/>
        </svg>
    </div>

    <!-- Product banner. Honest positioning (audit 2.7 / 5.4): this is a demo of a
         governed-access + immutable-audit layer, NOT an official state system. -->
    <div class="gov-banner">
        <div class="gov-banner-inner">
            <span class="gov-flag" aria-hidden="true"></span>
            <span class="gov-banner-text">IDEAQR · Управляемый доступ и неизменяемый аудит · демонстрационная версия</span>
            <button class="theme-toggle" id="themeToggle" type="button" aria-label="Переключить тему" title="Светлая / тёмная тема">
                <span id="themeIco" aria-hidden="true">☀</span>
            </button>
            <span class="gov-conn" id="healthPill">
                <span class="gov-dot" id="healthDot"></span>
                <span id="healthText">подключение…</span>
            </span>
        </div>
    </div>

    <!-- App bar: shown only when signed in. Populated by app.js. -->
    <header id="appbar" class="appbar" hidden>
        <div class="appbar-inner">
            <div class="brand">
                <span class="brand-mark" aria-hidden="true">
                    <svg viewBox="0 0 32 32" width="28" height="28" fill="none">
                        <rect x="2" y="2" width="12" height="12" rx="2.5" fill="currentColor"/>
                        <rect x="18" y="2" width="12" height="12" rx="2.5" fill="currentColor" opacity="0.5"/>
                        <rect x="2" y="18" width="12" height="12" rx="2.5" fill="currentColor" opacity="0.5"/>
                        <rect x="18" y="18" width="12" height="12" rx="2.5" fill="currentColor"/>
                    </svg>
                </span>
                <div class="brand-text">
                    <span class="brand-name">IDEAQR</span>
                    <span class="brand-sub">Цифровой шлюз доступа</span>
                </div>
            </div>
            <div id="user-chip" class="user-chip"></div>
        </div>
    </header>

    <!-- Single mount point; views are rendered by app.js. -->
    <main id="app" class="app-root">
        <div class="boot">
            <div class="boot-spinner" aria-hidden="true"></div>
            <p>Инициализация шлюза…</p>
        </div>
    </main>

    <!-- Camera scanner overlay (citizen terminal). -->
    <div id="scanner-overlay" class="scanner-overlay" hidden>
        <div class="scanner-modal" role="dialog" aria-modal="true" aria-label="Сканирование QR-кода">
            <div class="scanner-head">
                <h3>Сканирование QR-кода</h3>
                <button id="scanner-close" class="icon-btn" type="button" aria-label="Закрыть">✕</button>
            </div>
            <div class="reader-frame">
                <div id="reader" class="reader"></div>
                <!-- Animated targeting overlay (decorative; sits above the camera feed). -->
                <div class="scan-frame" aria-hidden="true">
                    <span class="scan-beam"></span>
                    <span class="corner tl"></span><span class="corner tr"></span>
                    <span class="corner bl"></span><span class="corner br"></span>
                </div>
            </div>
            <p class="scanner-hint">Наведите камеру на QR-код объекта</p>
        </div>
    </div>

    <!-- Toast notifications. -->
    <div id="toasts" class="toasts" aria-live="polite"></div>

    <!-- QR scanner library — self-hosted (audit 2.3): no dependency on unpkg.com. -->
    <script src="/assets/html5-qrcode.min.js"></script>
    <script src="/app.js" defer></script>
</body>
</html>
