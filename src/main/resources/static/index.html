<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0A1118">
    <title>IDEAQR — Цифровой шлюз</title>

    <!-- Cyrillic UI font + monospace for codes/UUIDs. System fallbacks in CSS. -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Golos+Text:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="/styles.css">
</head>
<body>
    <div class="bg-grid" aria-hidden="true"></div>
    <div class="bg-glow" aria-hidden="true"></div>

    <!-- Top bar: shown only when authenticated. Populated by app.js. -->
    <header id="topbar" class="topbar" hidden>
        <div class="brand">
            <span class="brand-mark">▦</span>
            <div class="brand-text">
                <span class="brand-name">IDEAQR</span>
                <span class="brand-sub">Цифровой шлюз доступа</span>
            </div>
        </div>
        <div id="user-chip" class="user-chip"></div>
    </header>

    <!-- Single mount point; views are rendered by app.js. -->
    <main id="app" class="app-root">
        <div class="boot">
            <div class="boot-spinner"></div>
            <p>Инициализация шлюза…</p>
        </div>
    </main>

    <!-- Camera scanner overlay (citizen terminal). -->
    <div id="scanner-overlay" class="scanner-overlay" hidden>
        <div class="scanner-modal">
            <div class="scanner-head">
                <h3>Сканирование QR-кода</h3>
                <button id="scanner-close" class="icon-btn" type="button" aria-label="Закрыть">✕</button>
            </div>
            <div id="reader" class="reader"></div>
            <p class="scanner-hint">Наведите камеру на QR-код объекта</p>
        </div>
    </div>

    <!-- Toast notifications. -->
    <div id="toasts" class="toasts" aria-live="polite"></div>

    <!-- QR scanner library (loaded from CDN at runtime in the browser). -->
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <script src="/app.js" defer></script>
</body>
</html>
