# ============================================================
# IDEAQR Digital Gateway - Stage 2
# Render Blueprint - deploy as a Docker Web Service
# ============================================================
services:
  - type: web
    name: ideaqr-gateway
    runtime: docker
    plan: free
    region: frankfurt
    dockerfilePath: ./Dockerfile
    healthCheckPath: /api/v2/health
    autoDeploy: true
    envVars:
      - key: JAVA_OPTS
        value: "-XX:MaxRAMPercentage=70.0 -XX:+UseSerialGC -XX:+ExitOnOutOfMemoryError"
      - key: SPRING_PROFILES_ACTIVE
        value: "prod"
