# ============================================================
#  IDEAQR Digital Gateway — Stage 3
#  Render Blueprint — deploy as a Docker Web Service
#
#  The default datasource is file-based H2. On Render, the container
#  filesystem is ephemeral, so a persistent disk is mounted at /app/data
#  (where the H2 file lives) to keep accounts and created QR objects
#  across deploys. For a managed database instead, set the `postgres`
#  Spring profile and the SPRING_DATASOURCE_* vars (see README).
# ============================================================
services:
  - type: web
    name: ideaqr-gateway
    runtime: docker
    plan: starter            # disks require a paid instance; use `free` without the disk
    region: frankfurt
    dockerfilePath: ./Dockerfile
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: JAVA_OPTS
        value: "-XX:MaxRAMPercentage=70.0 -XX:+UseSerialGC -XX:+ExitOnOutOfMemoryError"
      # Production profile: H2 web console hard-disabled, security headers on,
      # DB password required from the environment (audit 4.4 / 4.10).
      - key: SPRING_PROFILES_ACTIVE
        value: "prod"
      # Strong, platform-generated H2 password — never a blank `sa`.
      - key: H2_PASSWORD
        generateValue: true
      # To use a managed Postgres instead of file-H2, switch SPRING_PROFILES_ACTIVE
      # to "postgres" and provide DB_HOST / DB_PORT / DB_NAME / DB_USERNAME /
      # DB_PASSWORD (see application-postgres.properties and the database block below).
      # - key: DB_HOST
      #   fromDatabase: { name: ideaqr-db, property: host }
      # - key: DB_PORT
      #   fromDatabase: { name: ideaqr-db, property: port }
      # - key: DB_NAME
      #   fromDatabase: { name: ideaqr-db, property: database }
      # - key: DB_USERNAME
      #   fromDatabase: { name: ideaqr-db, property: user }
      # - key: DB_PASSWORD
      #   fromDatabase: { name: ideaqr-db, property: password }
    disk:
      name: ideaqr-data
      mountPath: /app/data
      sizeGB: 1

# Optional managed Postgres (uncomment together with the env vars above):
# databases:
#   - name: ideaqr-db
#     plan: free
#     region: frankfurt
